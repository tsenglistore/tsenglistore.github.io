<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tsengli Store</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#ff5722;
color:white;
padding:20px;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
max-width:1200px;
margin:auto;
}

.product{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100%;
border-radius:8px;
}

.product h3{
font-size:18px;
margin:10px 0;
}

.price{
color:#ff5722;
font-size:20px;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:#ee4d2d;
color:white;
text-decoration:none;
border-radius:6px;
}

.btn:hover{
background:#d84315;
}

footer{
text-align:center;
padding:20px;
color:#777;
}

</style>

</head>

<body>

<header>
<h1>Tsengli Store</h1>
<p>蝦皮商品展示</p>
</header>

<div class="container">

<!-- 商品1 -->
<div class="product">
<img src="images/p1.jpg">
<h3>蘋果保護殼 Apple Iphone 17 Pro Max</h3>
<div class="price">NT$249</div>
<a class="btn" href="https://s.shopee.tw/2g6R8e9f9t" target="_blank">
前往蝦皮購買
</a>
</div>

<!-- 商品2 -->
<div class="product">
<img src="images/p2.jpg">
<h3>SAMSUNG 25W T2510 含Type-C線</h3>
<div class="price">NT$419</div>
<a class="btn" href="https://s.shopee.tw/7poXICEd8d" target="_blank">
前往蝦皮購買
</a>
</div>

<!-- 商品3 -->
<div class="product">
<img src="images/p3.jpg">
<h3>Apple Pencil (USB-C) 觸控筆 A3085</h3>
<div class="price">NT$2289</div>
<a class="btn" href="https://s.shopee.tw/qemxDR3db" target="_blank">
前往蝦皮購買
</a>
</div>

</div>

<footer>
© 2026 Tsengli Store
</footer>

</body>
</html>
