<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>我的商品展示</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      color: #333;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #0077cc;
      color: white;
      padding: 20px;
      text-align: center;
    }
    h1 { margin: 0; }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px;
    }
    .product {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 250px;
      margin: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .product img {
      max-width: 100%;
      border-radius: 5px;
    }
    .product h2 {
      font-size: 20px;
      margin: 10px 0;
    }
    .product p {
      font-size: 16px;
      color: #555;
    }
    .buy-btn {
      display: inline-block;
      background-color: #28a745;
      color: white;
      padding: 10px 20px;
      margin-top: 10px;
      text-decoration: none;
      border-radius: 5px;
    }
    .buy-btn:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>
  <header>
    <h1>我的商品展示</h1>
    <p>歡迎來到我的小商店！</p>
  </header>

  <div class="container">
    <!-- 商品 1 -->
    <div class="product">
      <img src="https://via.placeholder.com/200x150.png?text=商品1" alt="商品1">
      <h2>商品 1</h2>
      <p>價格：NT$ 500</p>
      <a class="buy-btn" href="https://www.paypal.com/cgi-bin/webscr?cmd=_s-xclick&hosted_button_id=你的PayPal按鈕ID" target="_blank">立即購買</a>
    </div>

    <!-- 商品 2 -->
    <div class="product">
      <img src="https://via.placeholder.com/200x150.png?text=商品2" alt="商品2">
      <h2>商品 2</h2>
      <p>價格：NT$ 800</p>
      <a class="buy-btn" href="https://www.paypal.com/cgi-bin/webscr?cmd=_s-xclick&hosted_button_id=你的PayPal按鈕ID" target="_blank">立即購買</a>
    </div>

    <!-- 商品 3 -->
    <div class="product">
      <img src="https://via.placeholder.com/200x150.png?text=商品3" alt="商品3">
      <h2>商品 3</h2>
      <p>價格：NT$ 1200</p>
      <a class="buy-btn" href="https://www.paypal.com/cgi-bin/webscr?cmd=_s-xclick&hosted_button_id=你的PayPal按鈕ID" target="_blank">立即購買</a>
    </div>
  </div>

</body>
</html>
